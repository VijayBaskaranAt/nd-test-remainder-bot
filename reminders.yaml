reminders:
  - id: invoice_reminder
    message: "Send invoice for {{month}} {{year}}"
    schedule: "0 9 2 * *"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - google_chat

  - id: invoice_followup
    message: "Follow up on invoice for {{month}} {{year}}"
    schedule_type: interval_days
    interval_days: 45
    start_date: "2026-04-01"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - google_chat

  - id: test
    message: "Send invoice for {{month))"
    schedule: "0 9 2 * *"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - google_chat

