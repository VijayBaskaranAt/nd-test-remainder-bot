reminders:
  - id: invoice_reminder
    message: |
      Send invoice for {{month}} {{year}}
    schedule: "0 9 2 * *"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - google_chat
      - email
    email_recipients:
      - devops@navadhiti.com

  - id: invoice_followup
    message: |
      Follow up on invoice for {{month}} {{year}}
    schedule_type: interval_days
    interval_days: 45
    start_date: "2026-04-01"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - google_chat

  - id: ichb_monthly_data
    message: |
      run the query in HFAC prod env [mongo DB] and send the data to HFAC client :
      
      Luiz Mazzon <luiz@certifiedhumaneinternational.org>
      
      Subject: Region wise user in the label application - <<month>>
      
      db.guidelines.aggregate([
        {
          $match: { isActive: true }
        },
        {
          $lookup: {
            from: "customers",
            localField: "identifier",
            foreignField: "country",
            as: "customers"
          }
        },
        {
          $unwind: "$customers"
        },
        {
          $lookup: {
            from: "users",
            let: { customerId: "$customers._id" },
            pipeline: [
              {
                $match: {
                  $expr: {
                    $and: [
                      { $isArray: "$CustomerId" } // ensure it's an array
                      { $in: ["$$customerId", "$CustomerId"] }
                    ]
                  }
                }
              }
            ],
            as: "users"
          }
        },
        {
          $unwind: {
            path: "$users",
            preserveNullAndEmptyArrays: true
          }
        },
        {
          $group: {
            _id: "$name.en",
            customersSet: { $addToSet: "$customers._id" },
            usersSet: { $addToSet: "$users._id" }
          }
        },
        {
          $project: {
            _id: 0,
            country: "$_id",
            no_of_customers: { $size: "$customersSet" },
            no_of_users: {
              $size: {
                $filter: {
                  input: "$usersSet",
                  as: "u",
                  cond: { $ne: ["$$u", null] }
                }
              }
            }
          }
        }
      ])
    schedule: "0 9 28-31 * *"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - email
    email_recipients:
      - devops@navadhiti.com

  - id: gcp_api_key_deletion
    message: |
      We received a notification from GCP stating that we are using an unrestricted API key under APIs & Services. The key name is "EmployeeOnBoardPortal_API_Key".
      
      As of 13/05/2026, we have restricted this key to use only the Gmail API for one week. If no application issues or breaks are identified during this period, we can proceed with deleting the key and removing the remaining unused permissions.
      
      GCP → Navadhiti → APIs & Services
      
      If required, we can wait for one week before removing the remaining access.
    schedule_type: interval_days
    interval_days: 7
    start_date: "2026-05-13"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - email
    email_recipients:
      - devops@navadhiti.com

