reminders:
  - id: invoice_reminder
    message: "💰 Send invoice for {{month}} {{year}}"
    schedule: "0 9 2 * *"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - google_chat
    metadata:
      team: "finance"
      tags:
        - billing
        - monthly

  - id: standup_reminder
    message: "🧍 Daily standup in 5 minutes! Today is {{date}}"
    schedule: "25 9 * * 1-5"
    timezone: "Asia/Kolkata"
    enabled: true
    channels:
      - google_chat
    metadata:
      team: "engineering"
      tags:
        - daily
        - standup

  - id: weekly_report
    message: "📊 Weekly report due – Week of {{date}}"
    schedule: "0 17 * * 5"
    timezone: "Asia/Kolkata"
    enabled: false
    channels:
      - google_chat
      - email
    metadata:
      team: "management"
      tags:
        - weekly
        - report
