name: 🔔 Reminder Bot

on:
  # Run every 5 minutes
  schedule:
    - cron: "*/10 * * * *"

  # Allow manual trigger from GitHub UI or test button
  workflow_dispatch:
    inputs:
      test_reminder_id:
        description: "Reminder ID to test (leave blank for normal scheduled run)"
        required: false
        default: ""

permissions:
  contents: write  # needed to commit logs.json updates

jobs:
  run-reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🚀 Run reminder bot
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          TEST_REMINDER_ID: ${{ inputs.test_reminder_id }}
        run: python main.py

      - name: 💾 Commit updated logs
        run: |
          git config user.name "reminder-bot"
          git config user.email "bot@reminder.local"
          git add logs.json
          git diff --cached --quiet || git commit -m "📝 Update logs.json [skip ci]"
          git push
